name: MidiSpark
options:
  bundleIdPrefix: com.paulbarrett
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  Atomics:
    url: https://github.com/apple/swift-atomics
    from: 1.2.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "2"      # iPad
    DEVELOPMENT_TEAM: U9LCUSTWSQ     # signing survives `xcodegen generate` (which rewrites the .xcodeproj)
    CODE_SIGN_STYLE: Automatic
targets:
  MidiSpark:
    type: application
    platform: iOS
    sources: [App]
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: MidiSpark
        # Must match AUExtension/Info.plist's CFBundleShortVersionString — an app extension
        # whose version differs from its container fails embedded-binary validation.
        # The extension plist is hand-maintained, so bump BOTH together.
        CFBundleShortVersionString: "0.1.0"
    dependencies:
      - target: MidiSparkAU
        embed: true
  MidiSparkAU:
    type: app-extension
    platform: iOS
    sources:
      - path: AUExtension
        excludes: ["Info.plist"]     # plist is hand-maintained; never let it into Compile/Copy phases
    dependencies:
      - package: Atomics
        product: Atomics
    # NOTE: no `info:` block here — XcodeGen would REGENERATE (i.e. destroy) the handcrafted
    # plist that declares the aumi audio component. The file is referenced via INFOPLIST_FILE only.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paulbarrett.MidiSpark.AU
        INFOPLIST_FILE: AUExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO

  # Off-device unit tests for the pure engine core. macOS + host-less logic bundle → runs in
  # seconds with `xcodebuild test`, no simulator. Compiles the pure sources directly (they are
  # Foundation-only), so it does not link the iOS extension.
  MidiSparkTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - Tests
      - path: AUExtension/Derivations.swift
      - path: AUExtension/Models.swift
      - path: AUExtension/Snapshot.swift    # pure now (store split out) → effective-param tests
      - path: AUExtension/SnapshotBuilder.swift   # document → snapshot resolution
      - path: AUExtension/SceneFactory.swift       # the 16 factory scenes (Foundation-only)
      - path: AUExtension/Emission.swift    # MIDIEmitter seam — tests inject a recording double
      - path: AUExtension/Diag.swift        # KernelDiag (moved out of Kernel so Router is pure)
      - path: AUExtension/Router.swift      # the render engine — now Foundation-only, unit-testable
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.paulbarrett.MidiSparkTests
        CODE_SIGNING_ALLOWED: NO

# Shared schemes (written to xcshareddata → tracked, always present). Without this, XcodeGen
# generates no scheme and Xcode's auto-created ones live in xcuserdata — which is gitignored and
# was deleted, so the app scheme vanished. Run MidiSpark (the app); it embeds + registers the AU.
schemes:
  MidiSpark:
    build:
      targets:
        MidiSpark: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  MidiSparkTests:
    build:
      targets:
        MidiSparkTests: [test]
    test:
      config: Debug
      targets:
        - MidiSparkTests