<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>8x8 State — v58 Static Frames</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
html,body{margin:0;background:#111318;}
@keyframes flowX { from { background-position: 0 0; } to { background-position: 14px 0; } }
@keyframes flowY { from { background-position: 0 0; } to { background-position: 0 14px; } }
@keyframes lampPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
@keyframes altBreathe { 0%,100% { opacity: 0.95; } 50% { opacity: 0.3; } }
@keyframes padSweepX { from { left: 2px; } to { left: calc(100% - 4px); } }
@keyframes padSweepY { from { top: 14px; } to { top: calc(100% - 17px); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  bg:"#111318", panel:"#1A1D24", panelEdge:"#262B35",
  cellBg:"#0B0D11", cellEdge:"#20242D",
  text:"#C9CFDB", dim:"#5C6472",
  wire:"#252B36",
  inLit:"#E8ECF4",
  mono:"'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace",
};
const HUES = { select:"#EDF0F6", mute:"#FF6B4D", bypass:"#FFB020", solo:"#9FE84D", apply:"#2DD9E8" };
const COLORS = [
  { id:"gold",       hex:"#FFC53D" }, { id:"orange",  hex:"#FF7A1A" },
  { id:"vermilion",  hex:"#FF4B33" }, { id:"wine",    hex:"#C2244B" },
  { id:"magenta",    hex:"#FF4D9E" }, { id:"blush",   hex:"#FFA8B8" },
  { id:"purple",     hex:"#B44DFF" }, { id:"violet",  hex:"#7A3DF0" },
  { id:"indigo",     hex:"#5566FF" }, { id:"azure",   hex:"#38A6FF" },
  { id:"cyan",       hex:"#25E0F0" }, { id:"teal",    hex:"#148F80" },
  { id:"mint",       hex:"#7BF2CE" }, { id:"green",   hex:"#2ECC5E" },
  { id:"chartreuse", hex:"#C6F23D" }, { id:"bronze",  hex:"#C9A227" },
];
const PATTERNS = ["UP","DOWN","UP-DN","RANDOM","AS PLAYED"];
const ARP_RATES = ["1/4","1/8","1/8T","1/16","1/16T","1/32"];
const STEP_RATES = ["2/1","1/1","1/2","1/2.","1/4","1/8"];
const RATCHETS = [2,3,4,6,8];
const TYPES = ["ARP","RATCHET","PASS"];
const BUSES = ["A","B","C","D"];
const TAP_ACTIONS = ["ALT","BYP","MUTE"];
const PHASES = ["RETRIG","LEGATO","FREE"];
const COLS = 8, ROWS = 8, PASSES = 4;
const LANE_H = 13, LANE_PAD = 4;

// preset = the sound, now with a designed B-state (alt) per type
const typeDefaults = {
  ARP:     { type:"ARP", pattern:"UP", rate:"1/16", octaves:1, gate:0.6, phase:"RETRIG" },
  RATCHET: { type:"RATCHET", count:3, ramp:0.5 },
  PASS:    { type:"PASS", passes:[true,true,true,true] },
};
const altDefaults = (type) => (
  type === "ARP" ? { rate:"1/32", octaves:2 } :
  type === "RATCHET" ? { count:8 } :
  { passes:[true,false,true,false] }
);
const mkPreset = (type, extra) =>
  Object.assign({}, typeDefaults[type], { channel:0, transpose:0, morph:0, alt: altDefaults(type) }, extra || {});
const initialPresets = () => ({
  gold:       mkPreset("ARP", { pattern:"UP", rate:"1/16", octaves:2, alt:{ rate:"1/32", octaves:3 } }),
  orange:     mkPreset("ARP", { pattern:"UP-DN", rate:"1/8" }),
  vermilion:  mkPreset("PASS", { alt:{ passes:[true,false,true,false] } }),
  wine:       mkPreset("RATCHET", { count:2, alt:{ count:4 } }),
  magenta:    mkPreset("ARP", { channel:2, transpose:12, pattern:"UP-DN", rate:"1/8", alt:{ rate:"1/16", octaves:2 } }),
  blush:      mkPreset("ARP", { pattern:"AS PLAYED", rate:"1/8T" }),
  purple:     mkPreset("RATCHET", { count:6 }),
  violet:     mkPreset("ARP", { transpose:7, pattern:"DOWN", rate:"1/8T", octaves:2, gate:0.7, phase:"LEGATO", alt:{ rate:"1/16T", octaves:3 } }),
  indigo:     mkPreset("ARP", { pattern:"DOWN", rate:"1/4", transpose:-12 }),
  azure:      mkPreset("PASS", { passes:[true,false,false,false] }),
  cyan:       mkPreset("RATCHET", { count:4, alt:{ count:8 } }),
  teal:       mkPreset("ARP", { pattern:"RANDOM", rate:"1/16", phase:"FREE" }),
  mint:       mkPreset("RATCHET", { count:3, ramp:0.8 }),
  green:      mkPreset("PASS", { passes:[false,true,false,true] }),
  chartreuse: mkPreset("ARP", { channel:3, pattern:"RANDOM", rate:"1/16T", octaves:3, gate:0.5, alt:{ rate:"1/32", octaves:4 } }),
  bronze:     mkPreset("ARP", { pattern:"UP", rate:"1/32", gate:0.3 }),
});
const mkCell = (presetID, routing) =>
  Object.assign({ presetID, inputRow:null, inputChannel:0, buses:["A"], alt:false }, routing || {});

function ArpGrid() {
  const [grid, setGrid] = useState(() => {
    const g = Array.from({ length: COLS }, () => Array(ROWS).fill(null));
    g[0][0] = mkCell("gold");
    g[1][0] = mkCell("vermilion");
    g[2][0] = mkCell("vermilion", { buses:["A"] });
    g[2][1] = mkCell("magenta", { inputRow:0, buses:["B"] });
    g[3][0] = mkCell("violet", { buses:[] });        // LEGATO run with col 5's violet
    g[3][1] = mkCell("teal", { inputRow:0, buses:["D"] });        // FREE phase demo
    g[4][0] = mkCell("violet", { buses:[] });
    g[4][1] = mkCell("cyan", { inputRow:0, buses:[] });
    g[4][2] = mkCell("chartreuse", { inputRow:0, buses:["A","C"] });   // FAN-OUT: also taps row 1
    g[4][3] = mkCell("mint", { inputRow:1, buses:["B"] });             // taps the cyan — a tree
    g[5][0] = mkCell("gold", { alt:true });          // one cell pre-flipped to B
    g[6][0] = mkCell("violet", { buses:[] });
    g[6][1] = mkCell("cyan", { inputRow:0, buses:["A"] });
    g[7][0] = mkCell("magenta", { buses:["B"] });
    return g;
  });
  const [bypassed, setBypassed] = useState(() => new Set());
  const [cellMuted, setCellMuted] = useState(() => new Set());
  const [rowBypass, setRowBypass] = useState(() => new Set());
  const [colMute, setColMute] = useState(() => new Set());
  const [soloStacks, setSoloStacks] = useState(() => new Set());
  const [sMod, setSMod] = useState(false);
  const [tapAction, setTapAction] = useState("ALT");
  const [isolated, setIsolated] = useState(null);      // "c,r" hold-to-isolate
  const [heldStacks, setHeldStacks] = useState(() => new Set());  // stutter / loop brace
  const [heldRows, setHeldRows] = useState(() => new Set());      // row ALT push
  const sideTimers = useRef({});
  const suppressStack = useRef(false);
  const suppressRow = useRef(false);
  const [selStack, setSelStack] = useState(null);
  const [selRow, setSelRow] = useState(null);
  const [clipboard, setClipboard] = useState(null);
  const [presets, setPresets] = useState(initialPresets);
  const [selected, setSelected] = useState("gold");
  const [stateTab, setStateTab] = useState("A");       // sound panel A/B editor
  const [mode, setMode] = useState("PERFORM");
  const [playing, setPlaying] = useState(true);
  const [step, setStep] = useState(0);
  const [pass, setPass] = useState(0);
  const [stepRate, setStepRate] = useState("1/2");
  const [swing, setSwing] = useState(50);              // 50 = straight, 75 = max swing
  const [stepDur, setStepDur] = useState(1000);        // ms of the step in flight (drives the sweep)
  const [panelView, setPanelView] = useState("COLOUR"); // COLOUR | MORPH
  const [popover, setPopover] = useState(null);         // {c, r, kind:"in"|"out"} — edit-mode IO selector
  const [busChannels, setBusChannels] = useState([1, 2, 3, 4]); // per-bus stamp (INHERIT no longer exists)
  const [selectedBus, setSelectedBus] = useState(0);             // OUTPUTS panel selection
  const [autoWide, setAutoWide] = useState(typeof window !== "undefined" && window.innerWidth > 980);
  const [layoutMode, setLayoutMode] = useState("AUTO");   // AUTO | WIDE (landscape) | TALL (portrait)
  const [scene, setScene] = useState(0);                  // scene selector (slots host test sessions in dev builds)
  const wide = layoutMode === "AUTO" ? autoWide : layoutMode === "WIDE";
  useEffect(() => {
    const onR = () => setAutoWide(window.innerWidth > 980);
    window.addEventListener("resize", onR);
    return () => window.removeEventListener("resize", onR);
  }, []);
  const [spring, setSpring] = useState(false);
  const [master, setMaster] = useState(0);
  const springStore = useRef({});
  const lastTapRef = useRef({});

  useEffect(() => {
    if (!playing) return;
    const base = { "2/1":4000, "1/1":2000, "1/2":1000, "1/2.":1500, "1/4":500, "1/8":250 }[stepRate];
    let t = null;
    const tick = () => {
      setStep((sPrev) => {
        const next = (sPrev + 1) % COLS;
        if (next === 0) setPass((p) => (p + 1) % PASSES);
        const even = (next % 2) === 0;
        const dur = even ? base * (swing / 50) : base * (2 - swing / 50);
        setStepDur(dur);
        t = setTimeout(tick, dur);
        return next;
      });
    };
    t = setTimeout(tick, base);
    return () => clearTimeout(t);
  }, [playing, stepRate, swing]);
  const [heldCell, setHeldCell] = useState(null);      // audition hold
  const [latchedStacks, setLatchedStacks] = useState(() => new Set());
  const holdTimer = useRef(null);
  const suppressTap = useRef(false);

  const audition = mode === "PERFORM" && !playing;
  const performing = mode === "PERFORM" && playing;
  const soloActive = soloStacks.size > 0 && playing;
  const EDIT = mode === "EDIT";
  const GUT = EDIT ? 20 : 6;
  const GAPB = EDIT ? 17 : 5;

  const togglePlay = () => {
    setPlaying((pl) => {
      if (!pl) { setHeldCell(null); setLatchedStacks(new Set()); }
      setIsolated(null);
      setHeldStacks(new Set()); setHeldRows(new Set());
      return !pl;
    });
  };
  const switchMode = (m) => {
    setMode(m); setSelStack(null); setSelRow(null); setSMod(false); setIsolated(null);
    setHeldStacks(new Set()); setHeldRows(new Set());
  };

  const hexOf = (id) => { const c = COLORS.find((x) => x.id === id); return c ? c.hex : undefined; };
  const key = (c, r) => c + "," + r;
  const toggleSet = (setter) => (v) =>
    setter((s) => { const n = new Set(s); n.has(v) ? n.delete(v) : n.add(v); return n; });

  const updateCell = (c, r, patch) =>
    setGrid((g) => {
      const n = g.map((col) => col.map((x) => (x ? Object.assign({}, x) : null)));
      if (n[c][r]) Object.assign(n[c][r], patch);
      return n;
    });

  // effective params for a cell (A or B state; row ALT push forces B while held)
  const altOf = (cell, r) => cell.alt || (performing && heldRows.has(r));
  const interpField = (key, a, b, t) => {
    if (t <= 0) return a;
    if (t >= 0.999) return b;
    if (key === "rate") {
      const ia = ARP_RATES.indexOf(a), ib = ARP_RATES.indexOf(b);
      return ARP_RATES[Math.round(ia + (ib - ia) * t)];
    }
    if (typeof a === "number") {
      const v = a + (b - a) * t;
      return Number.isInteger(a) && Number.isInteger(b) ? Math.round(v) : v;
    }
    return t < 0.5 ? a : b;   // masks and other discrete fields switch at halfway
  };
  const effMorphOf = (pr) =>
    Math.min(1, (pr.morph || 0) + (1 - (pr.morph || 0)) * master);
  const effOf = (cell, r) => {
    const pr = presets[cell.presetID];
    if (altOf(cell, r)) return Object.assign({}, pr, pr.alt);   // flipped/pushed = full B
    const t = effMorphOf(pr);
    if (t <= 0) return pr;
    const m = Object.assign({}, pr);
    for (const k in pr.alt) m[k] = interpField(k, pr[k], pr.alt[k], t);
    return m;
  };

  // ---- taps & holds ----
  const performTap = (c, r) => {
    const cell = grid[c][r];
    if (!cell) return;
    if (tapAction === "ALT") updateCell(c, r, { alt: !cell.alt });
    else if (tapAction === "BYP") toggleSet(setBypassed)(key(c, r));
    else toggleSet(setCellMuted)(key(c, r));
  };
  const onCellClick = (c, r) => {
    if (suppressTap.current) { suppressTap.current = false; return; }
    if (EDIT) {
      setGrid((g) => {
        const n = g.map((col) => [...col]);
        const cur = n[c][r];
        if (!cur) n[c][r] = mkCell(selected);
        else if (cur.presetID === selected) n[c][r] = null;
        else n[c][r] = Object.assign({}, cur, { presetID: selected });
        return n;
      });
    } else if (performing) performTap(c, r);
  };
  const onCellDown = (c, r) => {
    if (audition) { if (grid[c][r]) setHeldCell(key(c, r)); return; }
    if (performing && grid[c][r]) {
      holdTimer.current = setTimeout(() => {
        setIsolated(key(c, r));
        suppressTap.current = true;
      }, 300);
    }
  };
  const onCellUp = () => {
    if (audition) { setHeldCell(null); return; }
    if (holdTimer.current) { clearTimeout(holdTimer.current); holdTimer.current = null; }
    if (isolated) setIsolated(null);
  };

  const beginStackHold = (c) => {
    if (!performing) return;
    sideTimers.current["s" + c] = setTimeout(() => {
      setHeldStacks((s) => { const n = new Set(s); n.add(c); return n; });
      suppressStack.current = true;
    }, 300);
  };
  const endStackHold = (c) => {
    if (sideTimers.current["s" + c]) { clearTimeout(sideTimers.current["s" + c]); delete sideTimers.current["s" + c]; }
    setHeldStacks((s) => { if (!s.has(c)) return s; const n = new Set(s); n.delete(c); return n; });
  };
  const beginRowHold = (r) => {
    if (!performing) return;
    sideTimers.current["r" + r] = setTimeout(() => {
      setHeldRows((s) => { const n = new Set(s); n.add(r); return n; });
      suppressRow.current = true;
    }, 300);
  };
  const endRowHold = (r) => {
    if (sideTimers.current["r" + r]) { clearTimeout(sideTimers.current["r" + r]); delete sideTimers.current["r" + r]; }
    setHeldRows((s) => { if (!s.has(r)) return s; const n = new Set(s); n.delete(r); return n; });
  };

  const onStackBtn = (c) => {
    if (suppressStack.current) { suppressStack.current = false; return; }
    if (EDIT) { setSelStack(selStack === c ? null : c); setSelRow(null); }
    else if (audition) toggleSet(setLatchedStacks)(c);
    else if (sMod) toggleSet(setSoloStacks)(c);
    else toggleSet(setColMute)(c);
  };
  const onRowBtn = (r) => {
    if (suppressRow.current) { suppressRow.current = false; return; }
    if (EDIT) { setSelRow(selRow === r ? null : r); setSelStack(null); }
    else if (!audition) toggleSet(setRowBypass)(r);
  };

  const copyStack = () => selStack !== null &&
    setClipboard(grid[selStack].map((x) => (x ? Object.assign({}, x) : null)));
  const pasteStack = () => {
    if (selStack === null || !clipboard) return;
    setGrid((g) => { const n = g.map((col) => [...col]); n[selStack] = clipboard.map((x) => (x ? Object.assign({}, x) : null)); return n; });
  };
  const clearStack = () =>
    selStack !== null && setGrid((g) => { const n = g.map((col) => [...col]); n[selStack] = Array(ROWS).fill(null); return n; });
  const fillRow = () =>
    selRow !== null && setGrid((g) => g.map((col) => col.map((v, r) => (r === selRow ? mkCell(selected) : v))));
  const clearRow = () =>
    selRow !== null && setGrid((g) => g.map((col) => col.map((v, r) => (r === selRow ? null : v))));

  const p = presets[selected];
  const setP = (patch) =>
    setPresets((ps) => ({ ...ps, [selected]: { ...ps[selected], ...patch } }));
  const setAlt = (patch) =>
    setPresets((ps) => ({ ...ps, [selected]: { ...ps[selected], alt: { ...ps[selected].alt, ...patch } } }));
  const STRAIGHT = ["1/4","1/8","1/16","1/32"], TRIPLETS = ["1/8T","1/16T"];
  const RUP = {2:4,3:6,4:8,6:8,8:8}, RDN = {2:2,3:2,4:2,6:3,8:4};
  const timeShift = (dir) => {
    if (p.type === "ARP") {
      const l = STRAIGHT.includes(p.rate) ? STRAIGHT : TRIPLETS;
      const i = Math.max(0, Math.min(l.length - 1, l.indexOf(p.rate) + dir));
      setP({ rate: l[i] });
    } else if (p.type === "RATCHET") {
      setP({ count: (dir > 0 ? RUP : RDN)[p.count] });
    }
  };
  const presetsRef = useRef(presets); presetsRef.current = presets;
  const masterRef = useRef(master); masterRef.current = master;
  const glideMorph = (cid, target) => {
    const start = cid === "__master" ? masterRef.current : (presetsRef.current[cid].morph || 0);
    const t0 = performance.now(), dur = 180;
    const stepFn = (now) => {
      const k = Math.min(1, (now - t0) / dur);
      const v = start + (target - start) * k;
      if (cid === "__master") setMaster(v);
      else setPresets((ps) => ({ ...ps, [cid]: { ...ps[cid], morph: v } }));
      if (k < 1) requestAnimationFrame(stepFn);
    };
    requestAnimationFrame(stepFn);
  };
  const setType = (type) => {
    const keep = { channel: p.channel, transpose: p.transpose };
    const defaults = {
      ARP: { type:"ARP", pattern:"UP", rate:"1/16", octaves:1, gate:0.6 },
      RATCHET: { type:"RATCHET", count:3, ramp:0.5 },
      PASS: { type:"PASS", passes:[true,false,false,false] },
    };
    setPresets((ps) => ({ ...ps, [selected]: Object.assign({}, defaults[type], keep, { alt: altDefaults(type) }) }));
    setStateTab("A");
  };

  // ---------- derived routing ----------
  const parentOf = (c, r) => {
    const cell = grid[c][r];
    if (!cell || cell.inputRow == null) return null;
    return cell.inputRow !== r && grid[c][cell.inputRow] ? cell.inputRow : null;
  };
  const structFed = (c, r) => parentOf(c, r) != null;
  const liveFed = (c, r) => {
    const p = parentOf(c, r);
    return p != null && !cellMuted.has(key(c, p));        // parent muted → revert to MIDI IN
  };
  const usesSource = (c, r) => !!grid[c][r] && !liveFed(c, r);
  const isTapped = (c, r) => {
    for (let r2 = 0; r2 < ROWS; r2++)
      if (r2 !== r && grid[c][r2] && grid[c][r2].inputRow === r) return true;
    return false;
  };
  const chainsBelow = (c, r) => !!grid[c][r] && isTapped(c, r);
  const noDestination = (c, r) => {
    const cell = grid[c][r];
    if (!cell || cell.buses.length > 0) return false;
    return !isTapped(c, r);
  };

  // playhead override: derived position means we can borrow time and snap back losslessly
  let effStep = step;
  if (performing && heldStacks.size === 1) {
    effStep = [...heldStacks][0];
  } else if (performing && heldStacks.size >= 2) {
    const locks = [...heldStacks];
    const lo = Math.min.apply(null, locks), hi = Math.max.apply(null, locks);
    effStep = lo + (step % (hi - lo + 1));
  }

  const colLive = (c) => {
    const cMuted = colMute.has(c) && playing && !soloActive;
    const soloedOut = soloActive && !soloStacks.has(c);
    if (cMuted || soloedOut) return false;
    if (playing) return effStep === c;
    if (audition) {
      if (latchedStacks.has(c)) return true;
      if (heldCell && heldCell.split(",")[0] == c) return true;
    }
    return false;
  };
  const cellActive = (c, r) => {
    const cell = grid[c][r];
    if (!cell || !colLive(c)) return false;
    if (cellMuted.has(key(c, r))) return false;
    if (isolated && isolated !== key(c, r)) return false;
    const eff = effOf(cell, r);
    if (playing && eff.type === "PASS" && !eff.passes[pass]) return false;
    if (audition && heldCell && heldCell !== key(c, r) && !latchedStacks.has(c)) return false;
    return true;
  };
  const cellEmitBuses = (c, r) => (cellActive(c, r) ? (grid[c][r] ? grid[c][r].buses : []) : []);
  const busFeeders = (b) => {
    const cols = [];
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r < ROWS; r++) {
        if (cellEmitBuses(c, r).includes(b)) { cols.push(c); break; }
      }
    }
    return cols;
  };
  const columnUsesSource = (c) => {
    if (!colLive(c)) return false;
    for (let r = 0; r < ROWS; r++) {
      if (grid[c][r] && usesSource(c, r) && (!isolated || isolated === key(c, r))) return true;
    }
    return false;
  };
  const srcCols = Array.from({ length: COLS }, (_, c) => c).filter((c) => columnUsesSource(c));
  const anySourceUse = srcCols.length > 0;
  const inEnd = anySourceUse ? Math.max.apply(null, srcCols) : -1;

  const railLeftX = (c) => "calc(" + c + " * (100% - 35px) / 8 + " + (c * 5 + 4) + "px)";
  const railRightX = (c) => "calc(" + (c + 1) + " * (100% - 35px) / 8 + " + (c * 5 - 4) + "px)";
  const laneEntryX = (c) => railRightX(c);

  function Wire({ dir, lit, color, style, thick }) {
    const w = thick || 2;
    const base = Object.assign({
      position:"absolute", borderRadius:w,
      background: lit ? color : T.wire,
      boxShadow: lit ? "0 0 6px " + color + "99" : "none",
      transition:"background 100ms, box-shadow 100ms",
      overflow:"hidden",
    }, style);
    if (dir === "h") { base.height = w; } else { base.width = w; }
    return (
      <div style={base}>
        {lit && (
          <div style={{
            position:"absolute", inset:0, borderRadius:w, opacity:0.85,

  function Node({ lit, color, style }) {

  function Chevron({ dirn, lit, color, style }) {
    const s = Object.assign({ position:"absolute", width:0, height:0, zIndex:4, transition:"all 100ms" }, style);
    if (dirn === "right") {
      s.borderTop = "3.5px solid transparent"; s.borderBottom = "3.5px solid transparent";

    if (lit) s.filter = "drop-shadow(0 0 3px " + color + ")";

  }
  function Port({ side, style }) {
    return (
      <div style={Object.assign({
        position:"absolute", width:4, height:8, zIndex:4,

  useEffect(() => {

  }, [popover, EDIT]);
  const cellParams = (eff) => {
    if (!eff) return "";
    const bits = [];
    if (eff.rate) bits.push(eff.rate);

    return bits.length ? bits.join(" ") : eff.type;
  };
  const Glyph = ({ eff, dimmed, unlitHex }) => {

  const sideBtn = (lit, litColor) => ({

  const stackBtnState = (c) => {

  const micro = (on, color, locked) => ({

  // sound panel: state-aware value accessor for editable-by-B fields
  const sv = (field) => (stateTab === "A" ? p[field] : (p.alt[field] !== undefined ? p.alt[field] : p[field]));
  const setSv = (field, v) => (stateTab === "A" ? setP({ [field]: v }) : setAlt({ [field]: v }));

  return (

        width:"100%", maxWidth:1340, background:T.panel,

  function ActionBtn({ children, onClick, disabled }) {
    return (
      <button onClick={onClick} disabled={disabled} style={{
        padding:"4px 10px", fontSize:8.5, fontFamily:T.mono, fontWeight:700,
        letterSpacing:1, cursor: disabled ? "default" : "pointer", borderRadius:6,
        border:"1px solid " + (disabled ? T.cellEdge : "#EDF0F644"),
        background:"transparent", color: disabled ? T.dim : T.text,
      }}>{children}</button>
    );
  }
  function Label({ children }) {
    return <div style={{ fontSize:9, letterSpacing:2, color:T.dim }}>{children}</div>;
  }
  function Field({ name, children }) {
    return (
      <div>
        <div style={{ fontSize:8.5, letterSpacing:1.5, color:T.dim, marginBottom:4 }}>{name}</div>
        {children}
      </div>
    );
  }
  function Stepper({ value, onChange, accent, bigStep, format }) {
    bigStep = bigStep || 12;
    format = format || ((v) => v);
    const btn = {
      width:24, height:24, borderRadius:6, cursor:"pointer",
      fontFamily:T.mono, fontSize:10, fontWeight:700,
      border:"1px solid " + T.cellEdge, background:"transparent", color:T.text,
    };
    return (
      <div style={{ display:"flex", alignItems:"center", gap:3 }}>
        <button style={Object.assign({}, btn, { fontSize:7 })} onClick={() => onChange(value - bigStep)}>-{bigStep}</button>
        <button style={btn} onClick={() => onChange(value - 1)}>−</button>
        <div style={{
          minWidth:30, textAlign:"center", fontSize:10, fontWeight:800,
          color: value !== 0 ? accent : T.dim,
        }}>{format(value)}</div>
        <button style={btn} onClick={() => onChange(value + 1)}>+</button>
        <button style={Object.assign({}, btn, { fontSize:7 })} onClick={() => onChange(value + bigStep)}>+{bigStep}</button>
      </div>
    );
  }
  function VFader({ value, onChange, accent, onGrab, onRelease }) {
    const trackRef = useRef(null);
    const setFrom = (clientY) => {
      const r = trackRef.current.getBoundingClientRect();
      onChange(Math.max(0, Math.min(1, 1 - (clientY - r.top) / r.height)));
    };
    const start = (e) => {
      onGrab && onGrab();
      setFrom(e.touches ? e.touches[0].clientY : e.clientY);
      const move = (ev) => setFrom(ev.touches ? ev.touches[0].clientY : ev.clientY);
      const up = () => {
        window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up);
        window.removeEventListener("touchmove", move); window.removeEventListener("touchend", up);
        onRelease && onRelease();
      };
      window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
      window.addEventListener("touchmove", move); window.addEventListener("touchend", up);
    };
    const pct = value * 100;
    return (
      <div ref={trackRef} onMouseDown={start} onTouchStart={start} style={{
        width:22, height:110, borderRadius:6, background:"#07090C",
        border:"1px solid " + T.cellEdge, position:"relative",
        cursor:"ns-resize", touchAction:"none", overflow:"hidden",
      }}>
        <div style={{
          position:"absolute", left:2, right:2, bottom:2,
          height:"calc(" + pct + "% - 3px)", borderRadius:4,
          background:accent + "44",
        }} />
        <div style={{
          position:"absolute", left:1, right:1, height:8, borderRadius:4,
          bottom:"calc(" + Math.max(0, Math.min(93, pct - 3)) + "%)",
          background:accent, boxShadow:"0 0 6px " + accent + "88",
        }} />
      </div>
    );
  }
  function MixStrip({ cid }) {
    const isMaster = cid === "__master";
    const hex = isMaster ? "#EDF0F6" : hexOf(cid);
    const val = isMaster ? master : (presets[cid].morph || 0);
    const used = isMaster || grid.some((col) => col.some((x) => x && x.presetID === cid));
    const bLit = !isMaster && grid.some((col) => col.some((x, rr) => x && x.presetID === cid && altOf(x, rr)));
    const setVal = (v) => isMaster ? setMaster(v)
      : setPresets((ps) => ({ ...ps, [cid]: { ...ps[cid], morph: v } }));
    const grab = () => {
      const now = performance.now();
      if (now - (lastTapRef.current[cid] || 0) < 300) setVal(0);
      lastTapRef.current[cid] = now;
      if (spring) springStore.current[cid] = val;
    };
    const release = () => {
      if (spring && springStore.current[cid] !== undefined) {
        glideMorph(cid, springStore.current[cid]);
        delete springStore.current[cid];
      }
    };
    return (
      <div style={{
        width:44, minWidth:44, display:"flex", flexDirection:"column",
        alignItems:"center", gap:4, opacity: used ? 1 : 0.35,
      }}>
        <div onClick={() => { if (!isMaster) { setSelected(cid); setStateTab("A"); } }} style={{
          width:20, height:14, borderRadius:4, background:hex,
          cursor: isMaster ? "default" : "pointer",
          boxShadow: !isMaster && selected === cid
            ? "0 0 0 1.5px " + T.cellBg + ", 0 0 0 3px " + hex
            : "inset 0 -2px 3px rgba(0,0,0,.35)",
        }} />
        <VFader value={val} onChange={setVal} accent={hex} onGrab={grab} onRelease={release} />
        <span style={{ fontSize:6.5, fontWeight:800, color: val > 0.005 ? (isMaster ? "#EDF0F6" : hex) : T.dim }}>
          {Math.round(val * 100)}
        </span>
        <span style={{ fontSize:5.5, letterSpacing:0.5, color:T.dim, fontWeight:800 }}>
          {isMaster ? "MASTER" : (presets[cid].type === "RATCHET" ? "RAT" : presets[cid].type)}
        </span>
        <span title="a cell of this colour is at full B" style={{
          width:5, height:5, borderRadius:3,
          background: bLit ? "#FFFFFF" : "transparent",
          border:"1px solid " + (bLit ? "#FFFFFF" : T.cellEdge),
          boxShadow: bLit ? "0 0 5px #fff" : "none",
        }} />
      </div>
    );
  }
  function HoldSeg({ options, value, onChange, accent }) {
    accent = accent || "#3D4657";
    const timer = useRef(null), borrowFrom = useRef(null), supp = useRef(false);
    const valRef = useRef(value); valRef.current = value;
    const [borrowed, setBorrowed] = useState(null);
    const down = (o) => {
      timer.current = setTimeout(() => {
        borrowFrom.current = valRef.current;
        setBorrowed(o); supp.current = true; onChange(o);
      }, 300);
    };
    const up = () => {
      if (timer.current) { clearTimeout(timer.current); timer.current = null; }
      if (borrowFrom.current !== null) {
        onChange(borrowFrom.current); borrowFrom.current = null; setBorrowed(null);
      }
    };
    const click = (o) => { if (supp.current) { supp.current = false; return; } onChange(o); };
    return (
      <div style={{ display:"flex", gap:3, flexWrap:"wrap" }}>
        {options.map((o) => (
          <button key={o}
            onMouseDown={() => down(o)} onMouseUp={up} onMouseLeave={up}
            onTouchStart={() => down(o)} onTouchEnd={up}
            onClick={() => click(o)}
            style={{
              padding:"4px 7px", fontSize:8.5, fontFamily:T.mono, cursor:"pointer",
              borderRadius:6,
              border:"1px solid " + (borrowed === o ? "#FFFFFF" : value === o ? accent : T.cellEdge),
              background: value === o ? accent + "26" : "transparent",
              color: value === o ? "#EDF0F6" : T.dim, fontWeight: value === o ? 700 : 400,
              boxShadow: borrowed === o ? "0 0 8px #FFFFFF88" : "none",
            }}>{o}</button>
        ))}
      </div>
    );
  }
  function Seg({ options, value, onChange, accent }) {
    accent = accent || "#3D4657";
    return (
      <div style={{ display:"flex", gap:3, flexWrap:"wrap" }}>
        {options.map((o) => (
          <button key={o} onClick={() => onChange(o)} style={{
            padding:"4px 7px", fontSize:8.5, fontFamily:T.mono, cursor:"pointer",
            borderRadius:6, border:"1px solid " + (value === o ? accent : T.cellEdge),
            background: value === o ? accent + "26" : "transparent",
            color: value === o ? "#EDF0F6" : T.dim, fontWeight: value === o ? 700 : 400,
          }}>{o}</button>
        ))}
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ArpGrid />);
</script>
</body>
</html>
